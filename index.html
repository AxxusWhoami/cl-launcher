<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrath of the Lich King — Lanzador</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="frost-overlay"></div>

    <main class="launcher">
      <canvas class="snow-layer" aria-hidden="true"></canvas>

      <div class="launcher__content">
      <header class="launcher__header">
        <nav class="ice-nav" data-i18n-aria-label="nav.aria" aria-label="Menú del lanzador">
          <span class="ice-nav__logo">
            <img src="/logotipo_corelegacy.png" alt="Core Legacy" />
          </span>
          <ul class="ice-nav__list">
            <li><button class="ice-tab is-active" type="button" data-view="inicio" aria-current="page" data-i18n="nav.home">Inicio</button></li>
            <li><button class="ice-tab" type="button" data-view="noticias" data-i18n="nav.news">Noticias</button></li>
            <li><button class="ice-tab" type="button" data-view="correcciones" data-i18n="nav.changelog">Correcciones</button></li>
            <li><button class="ice-tab" type="button" data-view="cuenta" data-i18n="nav.account">Cuenta</button></li>
            <li><button class="ice-tab" type="button" data-view="tienda" data-i18n="nav.store">Tienda</button></li>
          </ul>
          <div class="nav-controls">
            <button class="audio-toggle" id="audio-toggle" type="button" data-i18n-aria-label="audio.mute" aria-label="Silenciar música">
              <i class="fa-solid fa-volume-high"></i>
            </button>
            <button class="lang-toggle" id="lang-toggle" type="button" data-i18n-aria-label="lang.toggle" aria-label="Cambiar idioma" hidden>
              <i class="fa-solid fa-globe"></i>
              <span class="lang-toggle__label" id="lang-label">ES</span>
            </button>
          </div>
        </nav>
      </header>

      <section class="news view" data-view="inicio" aria-label="Inicio">
        <aside class="realm-status" aria-label="Estado del reino">
          <h2 class="news__heading" data-i18n="status.heading">Estado del servidor</h2>
          <div class="realm-status__body">
            <ul class="realm-status__list">
              <li class="realm-status__row">
                <span class="realm-status__label">
                  <i class="fa-solid fa-right-to-bracket realm-status__icon"></i>Login
                </span>
                <span class="realm-status__indicator" id="status-login">
                  <i class="fa-solid fa-circle realm-status__dot"></i>
                  <span class="realm-status__state">...</span>
                </span>
              </li>
              <li class="realm-status__row">
                <span class="realm-status__label">
                  <i class="fa-solid fa-server realm-status__icon"></i>CoRe Legacy
                </span>
                <span class="realm-status__indicator" id="status-server">
                  <i class="fa-solid fa-circle realm-status__dot"></i>
                  <span class="realm-status__state">...</span>
                </span>
              </li>
              <li class="realm-status__row">
                <span class="realm-status__label">
                  <i class="fa-solid fa-users realm-status__icon"></i>Players online
                </span>
                <span class="realm-status__value" id="status-players">-</span>
              </li>
              <li class="realm-status__row">
                <span class="realm-status__label">
                  <i class="fa-solid fa-clock realm-status__icon"></i>Uptime
                </span>
                <span class="realm-status__value" id="status-uptime">-</span>
              </li>
            </ul>
              <div class="realm-status__footer">
                <i class="fa-solid fa-rotate realm-status__spinner" id="status-spinner" aria-hidden="true"></i>
                <i class="fa-solid fa-clock-rotate-left realm-status__updated-icon" aria-hidden="true"></i>
                <span class="realm-status__updated" data-i18n="status.updated">Actualizado</span>
                <time class="realm-status__updated-time" id="status-last-updated">--:--:--</time>
              </div>
          </div>
        </aside>
      </section>

      <section class="news view" data-view="noticias" aria-label="Noticias" hidden>
        <div class="news__main">
          <h2 class="news__heading" data-i18n="news.heading">Noticias del Reino</h2>
          <div class="news__list" id="news-list" aria-live="polite">
            <p class="news__placeholder" id="news-placeholder" data-i18n="news.loading">Cargando noticias...</p>
          </div>
        </div>
      </section>

      <section class="account view" data-view="cuenta" aria-label="Cuenta" hidden>
        <div class="account__card">

          <div class="account__tabs" role="tablist" data-i18n-aria-label="account.tabs.label" aria-label="Sección de cuenta">
            <button class="account__tab is-active" type="button" role="tab"
              data-tab="login" aria-selected="true" aria-controls="panel-login"
              data-i18n="account.tab.login">
              Iniciar sesión
            </button>
            <button class="account__tab" type="button" role="tab"
              data-tab="register" aria-selected="false" aria-controls="panel-register"
              data-i18n="account.tab.register">
              Crear cuenta
            </button>
          </div>

          <div class="account__panel" id="panel-login" role="tabpanel">
            <form class="account__form" id="login-form" novalidate>
              <div class="account__field">
                <label class="account__label" for="login-user" data-i18n="account.login.user.label">Usuario o correo</label>
                <input class="account__input" id="login-user" name="username"
                  type="text" autocomplete="username"
                  data-i18n-placeholder="account.login.user.placeholder"
                  placeholder="Tu usuario o correo" required />
              </div>
              <div class="account__field">
                <label class="account__label" for="login-password" data-i18n="account.login.pass.label">Contraseña</label>
                <div class="account__input-wrap">
                  <input class="account__input" id="login-password" name="password"
                    type="password" autocomplete="current-password"
                    data-i18n-placeholder="account.login.pass.placeholder"
                    placeholder="Tu contraseña" required />
                  <button class="account__eye" type="button"
                    data-i18n-aria-label="account.login.show"
                    aria-label="Mostrar contraseña" data-target="login-password">
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </div>
              </div>
              <button class="account__forgot" type="button" id="forgot-toggle" data-i18n="account.login.forgot">¿Olvidaste tu contraseña?</button>
              <button class="account__submit" type="submit" data-i18n="account.login.submit">Iniciar sesión</button>
              <p class="account__field-error" id="login-error" role="alert" hidden></p>
            </form>
          </div>

          <div class="account__panel" id="panel-register" role="tabpanel" hidden>
            <form class="account__form" id="register-form" novalidate>
              <div class="account__field">
                <label class="account__label" for="reg-email" data-i18n="account.register.email.label">Correo electrónico</label>
                <input class="account__input" id="reg-email" name="email"
                  type="email" inputmode="email" autocomplete="email"
                  data-i18n-placeholder="account.register.email.placeholder"
                  placeholder="tu@correo.com" required />
              </div>
              <button class="account__submit" type="submit" data-i18n="account.register.submit">Crear cuenta</button>
              <p class="account__field-error" id="register-error" role="alert" hidden></p>
            </form>
          </div>

          <div class="account__panel account__recovery" id="panel-recovery" hidden>
            <button class="account__back" type="button" id="recovery-back" data-i18n="account.recovery.back">
              <i class="fa-solid fa-arrow-left"></i> Volver
            </button>
            <form class="account__form" id="recovery-form" novalidate>
              <div class="account__field">
                <label class="account__label" for="recovery-email" data-i18n="account.recovery.email.label">Correo electrónico</label>
                <input class="account__input" id="recovery-email" name="email"
                  type="email" inputmode="email" autocomplete="email"
                  data-i18n-placeholder="account.recovery.email.placeholder"
                  placeholder="tu@correo.com" required />
              </div>
              <button class="account__submit" type="submit" data-i18n="account.recovery.submit">Enviar link recuperación</button>
              <p class="account__field-error" id="recovery-error" role="alert" hidden></p>
            </form>
          </div>

        </div>
      </section>

      <section class="changelog view" data-view="correcciones" aria-label="Historial de correcciones" hidden>
        <div class="changelog__feed" id="changelog-list">
          <h2 class="news__heading" data-i18n="changelog.heading">Historial de correcciones</h2>
        </div>
      </section>

      <footer class="control-panel">
        <div class="progress" role="group" aria-label="Estado de la instalación">
          <div class="progress__info">
            <span class="progress__status" id="status" data-i18n="footer.status">Mensaje de estado ...</span>
            <span class="progress__percent" id="percent">100%</span>
          </div>
          <div class="progress__track">
            <div class="progress__bar" id="progress-bar" style="width: 100%"></div>
          </div>
          <div class="progress__stats">
            <span class="progress__size" id="size" data-i18n="footer.size">1 GB de 40 GB</span>
            <span class="progress__speed" id="speed" data-i18n="footer.speed">Transferencia 0 kbps</span>
          </div>
        </div>

        <button class="play-button" id="play-button" type="button" aria-label="Jugar" hidden>
          <img class="play-button__img" src="/launcher_jugar_250x200.png" alt="Jugar" />
        </button>
        <button class="play-button install-button" id="install-button" type="button" aria-label="Instalar" hidden>
          <img class="play-button__img" src="/launcher_instalar_250x200.png" alt="Instalar" />
        </button>
        <button class="play-button wait-button" id="wait-button" type="button" aria-label="Espere" disabled>
          <img class="play-button__img" src="/launcher_espere_250x200.png" alt="Espere" />
        </button>
      </footer>
      </div>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
